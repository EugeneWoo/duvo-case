<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Agent Traces</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      padding: 20px;
    }
    .container { max-width: 1400px; margin: 0 auto; }
    h1 {
      font-size: 28px;
      margin-bottom: 30px;
      color: #f1f5f9;
    }
    .controls {
      display: flex;
      gap: 12px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }
    button {
      padding: 8px 16px;
      background: #3b82f6;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
      transition: background 0.2s;
    }
    button:hover { background: #2563eb; }
    button:disabled { background: #64748b; cursor: not-allowed; }

    .traces-grid {
      display: grid;
      gap: 16px;
    }

    .trace-card {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 8px;
      padding: 16px;
      cursor: pointer;
      transition: border-color 0.2s;
    }
    .trace-card:hover { border-color: #64748b; }
    .trace-card.selected { border-color: #3b82f6; background: #1e3a4c; }

    .trace-header {
      display: flex;
      justify-content: space-between;
      align-items: start;
      margin-bottom: 12px;
    }

    .trace-title {
      font-size: 15px;
      color: #f1f5f9;
      word-break: break-word;
    }

    .trace-meta {
      display: flex;
      gap: 8px;
      font-size: 12px;
      color: #94a3b8;
      margin-top: 8px;
    }

    .trace-status {
      padding: 4px 8px;
      border-radius: 4px;
      font-size: 12px;
      font-weight: 500;
    }
    .status-running { background: #1e40af; color: #bfdbfe; }
    .status-completed { background: #166534; color: #bbf7d0; }
    .status-failed { background: #7f1d1d; color: #fca5a5; }

    .trace-detail {
      display: none;
      margin-left: 20px;
      border-left: 2px solid #334155;
      padding-left: 16px;
      margin-top: 16px;
    }
    .trace-detail.visible { display: block; }

    .steps-container {
      margin-top: 16px;
    }

    .step {
      background: #0f172a;
      border: 1px solid #334155;
      border-radius: 6px;
      padding: 12px;
      margin-bottom: 12px;
      font-size: 13px;
    }

    .step-header {
      display: flex;
      justify-content: space-between;
      margin-bottom: 8px;
      align-items: center;
      flex-wrap: wrap;
      gap: 8px;
    }

    .step-number {
      font-weight: 600;
      color: #3b82f6;
    }

    .step-status {
      padding: 2px 6px;
      border-radius: 3px;
      font-size: 11px;
      font-weight: 500;
    }
    .step-status.thinking { background: #1e40af; color: #bfdbfe; }
    .step-status.tool_use { background: #7c2d12; color: #fed7aa; }
    .step-status.executing { background: #1e40af; color: #bfdbfe; }
    .step-status.completed { background: #166534; color: #bbf7d0; }
    .step-status.final { background: #166534; color: #bbf7d0; }

    .step-type {
      display: inline-block;
      padding: 3px 8px;
      background: #334155;
      border-radius: 3px;
      font-size: 11px;
      color: #cbd5e1;
    }

    .step-details {
      margin-top: 8px;
      color: #cbd5e1;
      line-height: 1.5;
    }

    .step-detail-row {
      margin: 4px 0;
      word-break: break-word;
    }

    .detail-key {
      color: #94a3b8;
      font-weight: 500;
    }

    .detail-value {
      color: #e2e8f0;
      font-family: 'Monaco', 'Courier New', monospace;
      font-size: 12px;
    }

    .final-result {
      background: #1e293b;
      border-left: 3px solid #10b981;
      padding: 12px;
      margin-top: 12px;
      border-radius: 4px;
      color: #d1fae5;
      font-size: 13px;
      word-break: break-word;
    }

    .empty-state {
      text-align: center;
      padding: 40px 20px;
      color: #64748b;
    }

    .spinner {
      display: inline-block;
      width: 16px;
      height: 16px;
      border: 2px solid #3b82f6;
      border-top-color: transparent;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .evaluation-section {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 6px;
      padding: 12px;
      margin-top: 12px;
    }

    .evaluation-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
    }

    .evaluation-title {
      font-weight: 600;
      color: #f1f5f9;
      font-size: 14px;
    }

    .evaluate-btn {
      padding: 4px 12px;
      background: #10b981;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 12px;
      transition: background 0.2s;
    }
    .evaluate-btn:hover { background: #059669; }
    .evaluate-btn:disabled { background: #64748b; }

    .evaluation-results {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 8px;
    }

    .eval-item {
      background: #0f172a;
      border-radius: 4px;
      padding: 8px;
      font-size: 13px;
    }

    .eval-label {
      color: #94a3b8;
      font-weight: 500;
      margin-bottom: 4px;
    }

    .eval-value {
      font-weight: 600;
      font-size: 16px;
    }

    .eval-yes { color: #86efac; }
    .eval-no { color: #fca5a5; }
    .eval-pending { color: #94a3b8; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Agent Execution Traces</h1>

    <div class="controls">
      <button onclick="refreshTraces()">Refresh Traces</button>
      <button onclick="clearAllTraces()">Clear All</button>
      <label style="display: flex; align-items: center; gap: 8px; margin-top: 4px;">
        <input type="checkbox" id="autoRefresh" checked>
        Auto-refresh (2s)
      </label>
    </div>

    <div id="tracesContainer" class="traces-grid">
      <div class="empty-state">Loading traces...</div>
    </div>
  </div>

  <script>
    const API_BASE = '';
    let selectedTraceId = null;
    let autoRefreshInterval = null;

    async function refreshTraces() {
      try {
        const res = await fetch(API_BASE + '/api/traces');
        const { traces } = await res.json();
        renderTraces(traces);
      } catch (err) {
        console.error('Error fetching traces:', err);
        document.getElementById('tracesContainer').innerHTML =
          '<div class="empty-state">Error loading traces. Check console.</div>';
      }
    }

    function renderTraces(traces) {
      const container = document.getElementById('tracesContainer');

      if (traces.length === 0) {
        container.innerHTML = '<div class="empty-state">No traces yet. Send a message to the agent to see traces here.</div>';
        return;
      }

      container.innerHTML = traces.map(trace => `
        <div class="trace-card ${selectedTraceId === trace.id ? 'selected' : ''}" onclick="selectTrace(${trace.id})">
          <div class="trace-header">
            <div>
              <div class="trace-title">${escapeHtml(trace.userMessage.substring(0, 100))}${trace.userMessage.length > 100 ? '...' : ''}</div>
              <div class="trace-meta">
                <span class="trace-status status-${trace.status}">
                  ${trace.status === 'running' ? '<span class="spinner"></span> ' : ''}${trace.status.toUpperCase()}
                </span>
                <span>${trace.steps?.length || 0} steps</span>
                <span>${formatTime(trace.startTime)}</span>
              </div>
            </div>
          </div>

          <div class="trace-detail ${selectedTraceId === trace.id ? 'visible' : ''}">
            <div class="steps-container">
              ${trace.steps.map((step, i) => renderStep(step, i)).join('')}
            </div>
            ${trace.finalResult ? `
              <div class="final-result">
                <strong>Final Result:</strong><br>
                ${escapeHtml(trace.finalResult.substring(0, 500))}${trace.finalResult.length > 500 ? '...' : ''}
              </div>
            ` : ''}
            <div class="evaluation-section">
              <div class="evaluation-header">
                <div class="evaluation-title">LLM Judge Evaluation</div>
                <button class="evaluate-btn" onclick="evaluateTrace(${trace.id})" ${trace.evaluation && trace.evaluation.evaluatedAt ? 'style="background:#64748b"' : ''}>
                  ${trace.evaluation && trace.evaluation.evaluatedAt ? 'Re-evaluate' : 'Evaluate'}
                </button>
              </div>
              ${trace.evaluation && trace.evaluation.evaluatedAt ? `
                <div class="evaluation-results">
                  <div class="eval-item">
                    <div class="eval-label">Task Completion</div>
                    <div class="eval-value ${trace.evaluation.completionSuccess === true ? 'eval-yes' : trace.evaluation.completionSuccess === false ? 'eval-no' : 'eval-pending'}">
                      ${trace.evaluation.completionSuccess === true ? '✓ Yes' : trace.evaluation.completionSuccess === false ? '✗ No' : '—'}
                    </div>
                  </div>
                  <div class="eval-item">
                    <div class="eval-label">Relevance</div>
                    <div class="eval-value ${trace.evaluation.relevance === true ? 'eval-yes' : trace.evaluation.relevance === false ? 'eval-no' : 'eval-pending'}">
                      ${trace.evaluation.relevance === true ? '✓ Yes' : trace.evaluation.relevance === false ? '✗ No' : '—'}
                    </div>
                  </div>
                </div>
              ` : `
                <div style="color: #64748b; font-size: 12px; margin-top: 8px;">Click "Evaluate" to run LLM judge</div>
              `}
            </div>
          </div>
        </div>
      `).join('');
    }

    function renderStep(step, index) {
      let details = '';

      if (step.type === 'api_call') {
        details = `
          <div class="step-detail-row">
            <span class="detail-key">Model:</span>
            <span class="detail-value">${step.model}</span>
          </div>
          <div class="step-detail-row">
            <span class="detail-key">Messages in context:</span>
            <span class="detail-value">${step.messageCount}</span>
          </div>
        `;
      } else if (step.type === 'tool_decision') {
        details = `
          <div class="step-detail-row">
            <span class="detail-key">Tools to call:</span>
            <span class="detail-value">${step.toolsToCall.map(t => `<code>${t.name}</code>`).join(', ')}</span>
          </div>
        `;
      } else if (step.type === 'tool_execution') {
        details = `
          <div class="step-detail-row">
            <span class="detail-key">Tool:</span>
            <span class="detail-value">${step.toolName}</span>
          </div>
          <div class="step-detail-row">
            <span class="detail-key">Input:</span>
            <span class="detail-value">${escapeHtml(JSON.stringify(step.toolInput, null, 2).substring(0, 300))}</span>
          </div>
        `;
      } else if (step.type === 'tool_result') {
        details = `
          <div class="step-detail-row">
            <span class="detail-key">Tool:</span>
            <span class="detail-value">${step.toolName}</span>
          </div>
          <div class="step-detail-row">
            <span class="detail-key">Result snippet:</span>
            <span class="detail-value">${escapeHtml(step.resultSnippet)}</span>
          </div>
        `;
      } else if (step.type === 'completion') {
        details = `
          <div class="step-detail-row">
            <span class="detail-key">Final output:</span>
            <span class="detail-value">${escapeHtml(step.resultSnippet)}</span>
          </div>
        `;
      }

      return `
        <div class="step">
          <div class="step-header">
            <span class="step-number">#${index + 1}</span>
            <span class="step-type">${step.type.replace(/_/g, ' ')}</span>
            <span class="step-status ${step.status}">${step.status.toUpperCase()}</span>
          </div>
          <div class="step-details">${details}</div>
        </div>
      `;
    }

    function selectTrace(traceId) {
      selectedTraceId = selectedTraceId === traceId ? null : traceId;
      refreshTraces();
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    function formatTime(isoString) {
      const date = new Date(isoString);
      return date.toLocaleTimeString();
    }

    async function evaluateTrace(traceId) {
      try {
        const btn = event.target;
        btn.disabled = true;
        btn.textContent = 'Evaluating...';

        const res = await fetch(API_BASE + `/api/traces/${traceId}/evaluate`, {
          method: 'POST',
        });

        if (!res.ok) throw new Error('Evaluation failed');
        const { evaluation } = await res.json();

        // Update trace in memory and re-render
        const traces = document.querySelectorAll('.trace-card');
        refreshTraces();
      } catch (err) {
        console.error('Evaluation error:', err);
        alert('Error evaluating trace: ' + err.message);
        if (event.target) {
          event.target.disabled = false;
          event.target.textContent = 'Evaluate';
        }
      }
    }

    function clearAllTraces() {
      if (confirm('Clear all traces from memory?')) {
        selectedTraceId = null;
        document.getElementById('tracesContainer').innerHTML =
          '<div class="empty-state">Traces cleared. Run new agent queries to see them here.</div>';
      }
    }

    // Set up auto-refresh
    document.getElementById('autoRefresh').addEventListener('change', (e) => {
      if (e.target.checked) {
        autoRefreshInterval = setInterval(refreshTraces, 2000);
      } else {
        clearInterval(autoRefreshInterval);
      }
    });

    // Initial load and auto-refresh
    refreshTraces();
    autoRefreshInterval = setInterval(refreshTraces, 2000);
  </script>
</body>
</html>
